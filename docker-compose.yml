version: "3.9"

services:
  scylla-node1:
    image: scylladb/scylla:latest
    container_name: scylla-node1
    hostname: scylla-node1
    command: >
      --smp 1
      --memory 2000M
      --overprovisioned 1
      --developer-mode 1
      --reactor-backend=epoll
      --seeds=scylla-node1
    ports:
      - "9042:9042"
    networks:
      - backend

  scylla-node2:
    image: scylladb/scylla:latest
    container_name: scylla-node2
    hostname: scylla-node2
    depends_on:
      - scylla-node1
    command: >
      --smp 1
      --memory 2000M
      --overprovisioned 1
      --developer-mode 1
      --reactor-backend=epoll
      --seeds=scylla-node1
    networks:
      - backend

  scylla-node3:
    image: scylladb/scylla:latest
    container_name: scylla-node3
    hostname: scylla-node3
    depends_on:
      - scylla-node1
    command: >
      --smp 1
      --memory 2000M
      --overprovisioned 1
      --developer-mode 1
      --reactor-backend=epoll
      --seeds=scylla-node1
    networks:
      - backend

  redis:
    image: redis:7
    container_name: chat-redis
    ports:
      - "6379:6379"
    networks:
      - backend

networks:
  backend:
    driver: bridge
