## run : colima start --memory 6 --cpu 4

services:
  scylla-node1:
    image: scylladb/scylla:latest
    container_name: scylla-node1
    hostname: scylla-node1
    command: >
      --smp 1
      --memory 2000M
      --overprovisioned 1
      --developer-mode 1
      --reactor-backend=epoll
      --seeds=scylla-node1
    ports:
      - "9042:9042"
    networks:
      - scylla-net

  scylla-node2:
    image: scylladb/scylla:latest
    container_name: scylla-node2
    hostname: scylla-node2
    depends_on:
      - scylla-node1
    command: >
      --smp 1
      --memory 2000M
      --overprovisioned 1
      --developer-mode 1
      --reactor-backend=epoll
      --seeds=scylla-node1
    networks:
      - scylla-net

  scylla-node3:
    image: scylladb/scylla:latest
    container_name: scylla-node3
    hostname: scylla-node3
    depends_on:
      - scylla-node1
    command: >
      --smp 1
      --memory 2000M
      --overprovisioned 1
      --developer-mode 1
      --reactor-backend=epoll
      --seeds=scylla-node1
    networks:
      - scylla-net

networks:
  scylla-net:
    driver: bridge
